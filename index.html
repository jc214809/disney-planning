<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disney Trip Planner</title>
<link rel="icon" type="image/svg+xml" href="icons/favicon-transparent.svg">
<link rel="apple-touch-icon" href="icons/icon-192.svg">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-top">
    <img src="icons/logo-wide.svg" alt="Disney Trip Planner" class="app-logo">
    <div class="header-top-right">
      <button class="budget-toggle-btn" id="sheets-new-tab-btn" disabled>+ New Trip</button>
      <div id="google-auth-area">
        <div id="header-trips" hidden>
          <select id="header-trip-select" title="Switch trip"></select>
        </div>
        <button id="google-auth-btn" hidden></button>
        <div id="google-user-menu" hidden>
          <button id="google-signout-btn">Sign out</button>
        </div>
      </div>
    </div>
  </div>

  <div class="controls" hidden>
    <div class="date-inputs">
      <label>Start <input type="date" id="start-date"></label>
      <label>End <input type="date" id="end-date"></label>
      <button id="load-btn">Load</button>
    </div>
    <div class="controls-right">
      <label class="resort-toggle"><input type="checkbox" id="toggle-premier"> Lightning Lane Premier Pass</label>
      <label class="resort-toggle"><input type="checkbox" id="toggle-cruise"> Cruise</label>
      <button class="budget-toggle-btn" id="sheets-toggle-btn" hidden>Sheets</button>
    </div>
  </div>

  <!-- Sheets Panel (hidden select kept for internal state tracking) -->
  <div class="sheets-panel" id="sheets-panel" hidden>
    <div class="sheets-panel-inner">
      <select id="sheets-tab-select" hidden></select>
    </div>
  </div>

  <!-- Budget Panel -->
  <div class="budget-panel" id="budget-panel" hidden>
    <button class="budget-panel-header" id="budget-toggle-btn" aria-expanded="true">
      <span class="section-chevron">▾</span> Budget
    </button>
    <div class="budget-panel-inner">

      <!-- Section: Air -->
      <div class="budget-section" id="bs-air">
        <button class="budget-section-title section-collapse-btn" data-section="bs-air" aria-expanded="true">
          <span class="section-chevron">▾</span> Air
        </button>
        <div class="budget-section-body">
          <div class="air-row">
            <div class="budget-field">
              <label for="b-travelers">Travelers</label>
              <input type="number" id="b-travelers" min="1" max="20" value="1">
            </div>
            <div class="budget-field">
              <div class="budget-field-header">
                <label for="b-flights">Cost</label>
                <div class="mode-toggle" id="b-flights-mode">
                  <button class="mode-toggle-btn active" data-mode="person">/ Person</button>
                  <button class="mode-toggle-btn" data-mode="total">Total</button>
                </div>
              </div>
              <div class="budget-dollar-wrap"><span>$</span><input type="number" id="b-flights" min="0" step="1" placeholder="0"></div>
            </div>
          </div>
          <div class="air-row">
            <div class="budget-field">
              <label for="b-arrive">Arrival</label>
              <input type="datetime-local" id="b-arrive">
            </div>
            <div class="budget-field">
              <label for="b-depart">Departure</label>
              <input type="datetime-local" id="b-depart">
            </div>
          </div>
        </div>
      </div>

      <!-- Section: Transportation -->
      <div class="budget-section" id="bs-transport">
        <button class="budget-section-title section-collapse-btn" data-section="bs-transport" aria-expanded="true">
          <span class="section-chevron">▾</span> Transportation
        </button>
        <div class="budget-section-body">
          <div class="budget-section-fields">
            <div class="budget-field">
              <div class="budget-field-header">
                <label for="b-transport">Total Cost</label>
                <label class="mears-toggle-label"><input type="checkbox" id="b-mears-toggle"> Mears Connect</label>
              </div>
              <div class="budget-dollar-wrap"><span>$</span><input type="number" id="b-transport" min="0" step="1" placeholder="0"></div>
            </div>
          </div>
          <div id="b-mears-fields" hidden>
            <div class="mears-grid">
              <div class="mears-age-row mears-ways-row">
                <span class="mears-age-label">Direction</span>
                <span class="mears-age-price"></span>
                <div class="mears-ways-toggle">
                  <button class="mears-way-btn active" data-ways="1">1-way</button>
                  <button class="mears-way-btn" data-ways="2">Round trip</button>
                </div>
              </div>
              <div class="mears-age-row">
                <span class="mears-age-label">Under 3</span>
                <span class="mears-age-price">FREE</span>
                <div class="mears-stepper">
                  <button class="mears-step-btn" data-field="under3" data-dir="-1">−</button>
                  <span class="mears-step-val" id="mv-u3">0</span>
                  <button class="mears-step-btn" data-field="under3" data-dir="1">+</button>
                </div>
              </div>
              <div class="mears-age-row">
                <span class="mears-age-label">Ages 3–9</span>
                <span class="mears-age-price">$13/way</span>
                <div class="mears-stepper">
                  <button class="mears-step-btn" data-field="ages3to9" data-dir="-1">−</button>
                  <span class="mears-step-val" id="mv-3to9">0</span>
                  <button class="mears-step-btn" data-field="ages3to9" data-dir="1">+</button>
                </div>
              </div>
              <div class="mears-age-row">
                <span class="mears-age-label">Ages 10+</span>
                <span class="mears-age-price">$16/way</span>
                <div class="mears-stepper">
                  <button class="mears-step-btn" data-field="ages10plus" data-dir="-1">−</button>
                  <span class="mears-step-val" id="mv-10plus">0</span>
                  <button class="mears-step-btn" data-field="ages10plus" data-dir="1">+</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Section: Hotels -->
      <div class="budget-section" id="bs-hotels">
        <button class="budget-section-title section-collapse-btn" data-section="bs-hotels" aria-expanded="true">
          <span class="section-chevron">▾</span> Hotels
        </button>
        <div class="budget-section-body">
          <div id="budget-hotels-list"></div>
          <button class="add-hotel-btn" id="add-hotel-btn">+ Add Hotel</button>
        </div>
      </div>

      <!-- Section: Tickets -->
      <div class="budget-section" id="bs-tickets">
        <button class="budget-section-title section-collapse-btn" data-section="bs-tickets" aria-expanded="true">
          <span class="section-chevron">▾</span> Tickets
        </button>
        <div class="budget-section-body">
          <div class="budget-section-fields">
            <div class="budget-field">
              <label for="b-tickets">Tickets / person / day</label>
              <div class="budget-dollar-wrap"><span>$</span><input type="number" id="b-tickets" min="0" step="1" placeholder="0"></div>
              <label class="budget-ap-label"><input type="checkbox" id="b-annual-pass"> Annual Pass</label>
              <span class="budget-note" id="b-ticket-days"></span>
            </div>
          </div>
        </div>
      </div>

      <!-- Section: Cruise -->
      <div class="budget-section" id="bs-cruise" hidden>
        <button class="budget-section-title section-collapse-btn" data-section="bs-cruise" aria-expanded="true">
          <span class="section-chevron">▾</span> Cruise
        </button>
        <div class="budget-section-body">
        <div class="budget-section-fields">
          <div class="budget-field">
            <label for="b-cruise-ship">Ship</label>
            <select id="b-cruise-ship">
              <option value="">— Select ship —</option>
              <optgroup label="Magic Class">
                <option value="Disney Magic">Disney Magic</option>
                <option value="Disney Wonder">Disney Wonder</option>
              </optgroup>
              <optgroup label="Dream Class">
                <option value="Disney Dream">Disney Dream</option>
                <option value="Disney Fantasy">Disney Fantasy</option>
              </optgroup>
              <optgroup label="Wish Class">
                <option value="Disney Wish">Disney Wish</option>
                <option value="Disney Treasure">Disney Treasure</option>
                <option value="Disney Destiny">Disney Destiny</option>
              </optgroup>
              <optgroup label="Adventure Class">
                <option value="Disney Adventure">Disney Adventure</option>
              </optgroup>
            </select>
          </div>
          <div class="budget-field">
            <label for="b-cruise-sail">Sail Date</label>
            <input type="date" id="b-cruise-sail">
          </div>
          <div class="budget-field">
            <label for="b-cruise-nights">Nights</label>
            <input type="number" id="b-cruise-nights" min="1" max="30" step="1" placeholder="0">
          </div>
          <div class="budget-field">
            <label for="b-cruise-cabin">Cabin Cost</label>
            <div class="budget-dollar-wrap"><span>$</span><input type="number" id="b-cruise-cabin" min="0" step="1" placeholder="0"></div>
          </div>
          <div class="budget-field">
            <label for="b-cruise-fees">Port Fees &amp; Taxes</label>
            <div class="budget-dollar-wrap"><span>$</span><input type="number" id="b-cruise-fees" min="0" step="1" placeholder="0"></div>
          </div>
          <div class="budget-field">
            <label for="b-cruise-onboard">Onboard Budget</label>
            <div class="budget-dollar-wrap"><span>$</span><input type="number" id="b-cruise-onboard" min="0" step="1" placeholder="0"></div>
          </div>
        </div>
        <span class="budget-note" id="b-cruise-note"></span>
        </div>
      </div>

    </div>
  </div>
</header>

<div id="status"></div>

<!-- Trip name bar — shown above the calendar when signed in -->
<div id="trip-name-bar" hidden>
  <div id="trip-name-slot">
    <span id="trip-name-text"></span>
    <button id="trip-name-edit-btn" title="Rename trip">
      <svg viewBox="0 0 20 20" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13.586 3.586a2 2 0 1 1 2.828 2.828L7 15.828 3 17l1.172-4L13.586 3.586z"/>
      </svg>
    </button>
    <button id="trip-delete-btn" title="Delete trip">
      <svg viewBox="0 0 20 20" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 5 5 5 17 5"/><path d="M6 5V3h8v2"/><path d="M7 8l.5 8M10 8v8M13 8l-.5 8"/><rect x="4" y="5" width="12" height="12" rx="1"/>
      </svg>
    </button>
    <div class="park-toggles" id="park-toggles">
      <button class="park-toggle active" data-park="Magic Kingdom">Magic Kingdom</button>
      <button class="park-toggle active" data-park="EPCOT">EPCOT</button>
      <button class="park-toggle active" data-park="Hollywood Studios">Hollywood Studios</button>
      <button class="park-toggle active" data-park="Animal Kingdom">Animal Kingdom</button>
    </div>
    <input type="text" id="sheets-tab-name" placeholder="Trip name…" spellcheck="false" hidden>
    <button id="sheets-rename-btn" hidden>Rename</button>
    <button id="trip-name-cancel-btn" hidden>Cancel</button>
  </div>
  <span id="sheets-status" class="sheets-status"></span>
  <button id="sheets-save-btn" disabled>Save</button>
</div>

<div id="planner"></div>

<!-- Cost Summary Bar -->
<div class="cost-summary-bar" id="cost-summary-bar" hidden>
  <div class="cost-summary-inner">
    <button class="cost-item" id="cs-hotel" data-target="b-hotel">
      <span class="cost-label">Hotel</span>
      <span class="cost-value" id="cs-hotel-val">$0</span>
    </button>
    <div class="cost-sep"></div>
    <button class="cost-item" id="cs-flights" data-target="b-flights">
      <span class="cost-label">Flights</span>
      <span class="cost-value" id="cs-flights-val">$0</span>
    </button>
    <div class="cost-sep"></div>
    <button class="cost-item" id="cs-transport" data-target="b-transport">
      <span class="cost-label">Transport</span>
      <span class="cost-value" id="cs-transport-val">$0</span>
    </button>
    <div class="cost-sep"></div>
    <button class="cost-item" id="cs-tickets" data-target="b-tickets">
      <span class="cost-label">Tickets</span>
      <span class="cost-value" id="cs-tickets-val">$0</span>
    </button>
    <div class="cost-group" id="cs-llsp-wrap">
      <div class="cost-sep"></div>
      <button class="cost-item" id="cs-llsp">
        <span class="cost-label">LL Single</span>
        <span class="cost-value" id="cs-llsp-val">$0</span>
      </button>
      <div class="cost-sep"></div>
      <button class="cost-item" id="cs-llmp">
        <span class="cost-label">LLMP</span>
        <span class="cost-value" id="cs-llmp-val">$0</span>
      </button>
    </div>
    <div class="cost-group" id="cs-cruise-wrap" hidden>
      <div class="cost-sep"></div>
      <button class="cost-item" id="cs-cruise" data-target="b-cruise-cabin">
        <span class="cost-label">Cruise</span>
        <span class="cost-value" id="cs-cruise-val">$0</span>
      </button>
    </div>
    <div class="cost-sep cost-sep-total"></div>
    <div class="cost-item cost-total">
      <span class="cost-label">TOTAL</span>
      <span class="cost-value" id="cs-total-val">$0</span>
    </div>
    <div class="cost-sep cost-sep-total"></div>
    <div class="cost-item cost-total cost-per-person">
      <span class="cost-label">/ PERSON</span>
      <span class="cost-value" id="cs-perperson-val">$0</span>
    </div>
  </div>
</div>

<!-- New Trip Modal -->
<div id="new-trip-modal" class="modal-backdrop" hidden>
  <div class="modal">
    <h2 class="modal-title">New Trip</h2>

    <div class="modal-field">
      <label for="nt-start">Start date</label>
      <input type="date" id="nt-start">
    </div>
    <div class="modal-field">
      <label for="nt-end">End date</label>
      <input type="date" id="nt-end">
    </div>
    <div class="modal-field">
      <label for="nt-resort">Hotel</label>
      <select id="nt-resort"></select>
    </div>
    <div class="modal-field">
      <label for="nt-travelers">Travelers</label>
      <input type="number" id="nt-travelers" min="1" max="20" value="2">
    </div>
    <div class="modal-field">
      <label for="nt-name">Trip name</label>
      <input type="text" id="nt-name" placeholder="Auto-filled from dates & hotel" spellcheck="false">
    </div>

    <div class="modal-actions">
      <button id="nt-cancel-btn" class="modal-btn-cancel">Cancel</button>
      <button id="nt-create-btn" class="modal-btn-create">Create Trip</button>
    </div>
  </div>
</div>

<!-- Delete Trip Modal -->
<div id="delete-trip-modal" class="modal-backdrop" hidden>
  <div class="modal modal-sm">
    <h2 class="modal-title">Delete Trip</h2>
    <p class="modal-body">Are you sure you want to delete <strong id="delete-trip-name"></strong>? This cannot be undone.</p>
    <div class="modal-actions">
      <button id="dt-cancel-btn" class="modal-btn-cancel">Cancel</button>
      <button id="dt-confirm-btn" class="modal-btn-delete">Delete</button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="api.js"></script>
<script src="app.js"></script>
<script src="sheets.js"></script>
<!-- Google Identity Services and gapi — loaded async; callbacks wired in sheets.js -->
<script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
<script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
</body>
</html>
