<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disney Trip Planner</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Disney Trip Planner</h1>
  <div class="controls">
    <div class="date-inputs">
      <label>Start <input type="date" id="start-date"></label>
      <label>End <input type="date" id="end-date"></label>
      <button id="load-btn">Load</button>
    </div>
    <div class="park-toggles" id="park-toggles">
      <button class="park-toggle active" data-park="Magic Kingdom">Magic Kingdom</button>
      <button class="park-toggle active" data-park="EPCOT">EPCOT</button>
      <button class="park-toggle active" data-park="Hollywood Studios">Hollywood Studios</button>
      <button class="park-toggle active" data-park="Animal Kingdom">Animal Kingdom</button>
    </div>
    <div class="resort-toggles">
      <label class="resort-toggle">
        <span class="resort-toggle-label">Staying at</span>
        <select id="resort-select">
          <option value="">Off-site / Day Guest</option>
          <optgroup label="Value Resorts">
            <option value="value">All-Star Movies Resort</option>
            <option value="value">All-Star Music Resort</option>
            <option value="value">All-Star Sports Resort</option>
            <option value="value">Art of Animation Resort</option>
            <option value="value">Pop Century Resort</option>
          </optgroup>
          <optgroup label="Moderate Resorts">
            <option value="moderate">Caribbean Beach Resort</option>
            <option value="moderate">Coronado Springs Resort</option>
            <option value="moderate">Port Orleans – French Quarter</option>
            <option value="moderate">Port Orleans – Riverside</option>
          </optgroup>
          <optgroup label="Deluxe Resorts">
            <option value="deluxe">Animal Kingdom Lodge</option>
            <option value="deluxe">Beach Club Resort</option>
            <option value="deluxe">BoardWalk Inn</option>
            <option value="deluxe">Contemporary Resort</option>
            <option value="deluxe">Grand Floridian Resort &amp; Spa</option>
            <option value="deluxe">Polynesian Village Resort</option>
            <option value="deluxe">Wilderness Lodge</option>
            <option value="deluxe">Yacht Club Resort</option>
            <option value="deluxe">Swan Hotel</option>
            <option value="deluxe">Dolphin Hotel</option>
            <option value="deluxe">Swan Reserve</option>
          </optgroup>
          <optgroup label="Deluxe Villa / DVC">
            <option value="deluxe">Animal Kingdom Villas – Kidani Village</option>
            <option value="deluxe">Bay Lake Tower at Contemporary Resort</option>
            <option value="deluxe">Beach Club Villas</option>
            <option value="deluxe">BoardWalk Villas</option>
            <option value="deluxe">Boulder Ridge Villas at Wilderness Lodge</option>
            <option value="deluxe">Copper Creek Villas &amp; Cabins at Wilderness Lodge</option>
            <option value="deluxe">Fort Wilderness – Cabins</option>
            <option value="deluxe">Lakeshore Lodge</option>
            <option value="deluxe">Old Key West Resort</option>
            <option value="deluxe">Polynesian Villas &amp; Bungalows</option>
            <option value="deluxe">Riviera Resort</option>
            <option value="deluxe">Saratoga Springs Resort &amp; Spa</option>
            <option value="deluxe">Treehouse Villas at Saratoga Springs</option>
            <option value="deluxe">Villas at Grand Floridian Resort</option>
          </optgroup>
          <optgroup label="Campground">
            <option value="value">Fort Wilderness – Campsites</option>
          </optgroup>
        </select>
      </label>
      <label class="resort-toggle"><input type="checkbox" id="toggle-premier"> Lightning Lane Premier Pass</label>
    </div>
  </div>
</header>

<div id="status"></div>

<div id="planner"></div>

<script src="api.js"></script>
<script src="app.js"></script>
</body>
</html>
