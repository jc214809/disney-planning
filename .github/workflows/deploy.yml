name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest events data
        run: |
          curl -sf "https://raw.githubusercontent.com/jc214809/disney-planning/data/events-data.json" \
            -o events-data.json || echo "[]" > events-data.json

      - name: Write config.js from secrets
        run: |
          cat > config.js <<EOF
          const GOOGLE_CLIENT_ID = '${{ secrets.GOOGLE_CLIENT_ID }}';
          const GOOGLE_API_KEY   = '${{ secrets.GOOGLE_API_KEY }}';
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
